name: visitar_teste
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # --- AR ---
  ar_flutter_plugin_updated: ^0.0.1

  # --- BACKEND ---
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # --- MAPAS, GPS E BÚSSOLA (O Trio Geo-AR) ---
  google_maps_flutter: ^2.14.0 
  geolocator: ^13.0.4 
  permission_handler: ^11.0.1
  flutter_compass: ^0.8.0  # <--- ADICIONADO (Essencial para saber a direção!)
  model_viewer_plus: ^1.7.0

  # --- UTILITÁRIOS ---
  cupertino_icons: ^1.0.8
  vector_math: ^2.2.0
  path_provider: ^2.1.5
  image_picker: ^1.0.4
  firebase_storage: ^13.0.5

  # ... as tuas outras dependências
  shelf: ^1.4.1        # Para criar o servidor
  shelf_static: ^1.1.2 # Para servir ficheiros da pasta
  http: ^1.1.0         # Para fazer o download inicial
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.1
  flutter_svg: ^2.2.3
  wakelock_plus: ^1.5.2
  audioplayers: ^6.7.1
  file_picker: ^11.0.2
  panorama_viewer: ^2.0.7
  provider: ^6.1.2
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/models/marker.glb
    - assets/app-icon.png

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F9D58" 
  
  # Define a imagem da frente (o teu logo transparente)
  adaptive_icon_foreground: "assets/app-icon.png"

flutter_native_splash:
  # Fundo Verde
  color: "#0F9D58"
  
  # A tua nova imagem que só tem o texto (com fundo transparente)
  image: "assets/titulo.png"
  
  fullscreen: true

  android_12:
    image: "assets/titulo.png"
    color: "#0F9D58"
    # Se o texto ficar muito pequeno/grande, o Android 12 gere isso automaticamente,
    # mas garante que a imagem tem margem transparente suficiente.

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
